services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web2_ci4_app
    ports:
      - "8082:80"
    volumes:
      - ./app:/var/www/html
    environment:
      TZ: Asia/Jakarta
      DB_HOST: db
      DB_PORT: 3306
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: web2_ci4_db
    ports:
      - "3307:3306"
    environment:
      TZ: Asia/Jakarta
      MYSQL_DATABASE: lab_ci4
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: ci4user
      MYSQL_PASSWORD: ci4pass
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
